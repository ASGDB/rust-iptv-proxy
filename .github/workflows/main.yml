name: Build ipk

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ v* ]
  pull_request:

permissions:
  contents: write

jobs:
  build-openwrt:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            sdk: https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-toolchain-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            ipk_arch: x86_64
          - target: aarch64-unknown-linux-musl
            sdk: https://downloads.openwrt.org/releases/24.10.2/targets/armsr/armv8/openwrt-toolchain-24.10.2-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            ipk_arch: aarch64_cortex-a53
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install upx
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Build binary
        run: |
          rustup toolchain add nightly
          rustup +nightly component add rust-src
          rustup +nightly target add ${{ matrix.target }} || true
          mkdir -p ~/openwrt
          wget "${{ matrix.sdk }}" -qO- | tar --strip-components 1 -C ~/openwrt -xv --zstd
          toolchain="$(ls -d ~/openwrt/toolchain-*)"
          if [ "${{ matrix.target }}" == "mipsel-unknown-linux-musl" ]; then
            res_dir="$(ls -d ${toolchain}/lib/gcc/*/*)"
            cp ${res_dir}/libgcc.a ${res_dir}/libunwind.a
            export RUSTFLAGS="-Ctarget-feature=+crt-static -Zlocation-detail=none -Zunstable-options -Cpanic=immediate-abort -Clinker=$(ls ${toolchain}/bin/*-openwrt-linux-gcc) -L${toolchain}/lib -L${res_dir}"
          else
            export RUSTFLAGS="-Ctarget-feature=+crt-static -Zlocation-detail=none -Zunstable-options -Cpanic=immediate-abort -Clinker=$(ls ${toolchain}/bin/*-openwrt-linux-gcc)"
          fi
          cargo +nightly build -Zbuild-std=std,panic_abort -r --target ${{ matrix.target }}
          upx -9 target/${{ matrix.target }}/release/iptv

      - name: Package as .ipk (using ar)
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi

          mkdir -p ipk_pkg/usr/bin
          cp target/${{ matrix.target }}/release/iptv ipk_pkg/usr/bin/iptv-proxy

          mkdir -p ipk_pkg/CONTROL
          cat > ipk_pkg/CONTROL/control << EOF
          Package: iptv-proxy
          Version: $VERSION
          Architecture: ${{ matrix.ipk_arch }}
          Maintainer: github@actions
          Description: IPTV proxy with JSON channel list support
          EOF

          (cd ipk_pkg/CONTROL && tar -czf ../../control.tar.gz .)
          (cd ipk_pkg/usr && tar -czf ../../data.tar.gz .)
          echo "2.0" > debian-binary
          ar cr iptv-proxy_${{ matrix.ipk_arch }}.ipk debian-binary control.tar.gz data.tar.gz
          rm -rf ipk_pkg debian-binary control.tar.gz data.tar.gz

      - name: Upload binary (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/iptv

      - name: Upload IPK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: iptv-proxy_${{ matrix.ipk_arch }}.ipk
          path: iptv-proxy_${{ matrix.ipk_arch }}.ipk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/${{ matrix.target }}/release/iptv
            iptv-proxy_${{ matrix.ipk_arch }}.ipk
          overwrite: true
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build x86_64-pc-windows-gnu
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        pacboy: upx:p
    - name: Build
      env:
        RUSTFLAGS: -Ctarget-feature=-crt-static -Zunstable-options -Cpanic=immediate-abort -Zlocation-detail=none
      run: |
        rustup set default-host x86_64-pc-windows-gnu
        rustup toolchain add nightly-gnu
        rustup +nightly component add rust-src
        cargo +nightly build -Z build-std=std,panic_abort -r --target x86_64-pc-windows-gnu
        msys2 -c 'upx -9 ./target/x86_64-pc-windows-gnu/release/iptv.exe'
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: x86_64-pc-windows-gnu
        path: target/x86_64-pc-windows-gnu/release/iptv.exe
